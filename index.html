<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Face Detection Camera</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0f0f0f;
color:white;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

header{
font-size:22px;
font-weight:600;
padding:15px;
}

.camera-container{
position:relative;
width:95%;
max-width:420px;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

video{
width:100%;
border-radius:15px;
}

canvas{
position:absolute;
top:0;
left:0;
}

.controls{
margin-top:20px;
display:flex;
gap:15px;
}

button{
padding:12px 18px;
border-radius:10px;
border:2px solid #00f2ff;
background:transparent;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00f2ff;
color:black;
transform:scale(1.08);
}

button:active{
transform:scale(0.95);
}

#photo{
margin-top:20px;
width:90%;
max-width:420px;
border-radius:10px;
}

/* Ad container */

.ad-container{
width:100%;
display:flex;
justify-content:center;
margin-top:20px;
}

#ad-slot{
width:320px;
height:50px;
}

</style>
</head>

<body>

<header>🤖 AI Face Detection Camera</header>

<div class="camera-container">
<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>
</div>

<div class="controls">
<button onclick="capturePhoto()">📸 Capture</button>
<button onclick="startCamera()">🎥 Start</button>
</div>

<img id="photo">

<!-- Ad Banner -->
<div class="ad-container">
<div id="ad-slot"></div>
</div>

<script>

/* Camera Start */

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let model;

async function startCamera(){

const stream = await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject = stream;

video.onloadedmetadata = () => {

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

detectFaces();

}

}

/* Load AI Model */

async function loadModel(){
model = await blazeface.load();
}

loadModel();

/* Face Detection */

async function detectFaces(){

const predictions = await model.estimateFaces(video,false);

ctx.clearRect(0,0,canvas.width,canvas.height);

predictions.forEach(prediction=>{

const start = prediction.topLeft;
const end = prediction.bottomRight;

const size = [
end[0]-start[0],
end[1]-start[1]
];

ctx.strokeStyle="#00ffea";
ctx.lineWidth=3;
ctx.strokeRect(start[0],start[1],size[0],size[1]);

});

requestAnimationFrame(detectFaces);

}

/* Capture Photo */

function capturePhoto(){

const photoCanvas = document.createElement("canvas");
photoCanvas.width = video.videoWidth;
photoCanvas.height = video.videoHeight;

const photoCtx = photoCanvas.getContext("2d");

photoCtx.drawImage(video,0,0);

document.getElementById("photo").src =
photoCanvas.toDataURL("image/png");

}

/* Ads Script */

(function(){

window.atOptions = {
key : "c46b49b27476a02f3363a7a17fba73d6",
format : "iframe",
height : 50,
width : 320,
params : {}
};

const script = document.createElement("script");
script.src =
"//www.highperformanceformat.com/c46b49b27476a02f3363a7a17fba73d6/invoke.js";

document.getElementById("ad-slot").appendChild(script);

})();

</script>

</body>
</html>
